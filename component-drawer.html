<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Component - Drawer</title><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script><style>body{margin:0;font-family:"IBM Plex Sans","Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}.wrap{max-width:1100px;margin:40px auto;padding:0 20px}h1{margin:0 0 8px}.sub{color:#475569;margin:0 0 20px}.stage{position:relative;background:#fff;border:1px solid #e2e8f0;border-radius:14px;min-height:430px;overflow:hidden}.content{padding:18px}.drawer{position:absolute;top:0;bottom:0;width:360px;background:#fff;box-shadow:-10px 0 30px rgba(15,23,42,.2);right:0;padding:16px;border-left:1px solid #e2e8f0}.nested{margin-top:12px;border:1px dashed #cbd5e1;border-radius:10px;padding:10px;background:#f8fafc}.chip{display:inline-block;background:#e2e8f0;border-radius:999px;font-size:12px;padding:4px 8px;margin-right:6px}</style></head><body><main class="wrap"><h1>Drawer</h1><p class="sub">Right/left drawers with nested flow and dirty-form guard note.</p><section class="stage"><div class="content"><span class="chip">Main App Canvas</span><p>Background remains visible while drawer hosts task details.</p></div><aside class="drawer" role="dialog" aria-modal="true"><h2 style="margin:0 0 8px">Edit record</h2><p style="margin:0;color:#475569">Unsaved change guard triggers on close.</p><div class="nested"><strong>Nested step</strong><p style="margin:6px 0 0;color:#475569">Secondary panel for related settings.</p></div></aside></section></main></body></html>
