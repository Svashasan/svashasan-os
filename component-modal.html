<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Component - Modal</title><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script><style>body{margin:0;font-family:"IBM Plex Sans","Segoe UI",sans-serif;background:#eef2ff;color:#0f172a}.wrap{max-width:980px;margin:40px auto;padding:0 20px}h1{margin:0 0 8px}.sub{color:#475569;margin:0 0 20px}.overlay{background:rgba(15,23,42,.45);padding:24px;border-radius:14px}.modal{max-width:560px;background:#fff;border-radius:12px;padding:18px;box-shadow:0 20px 40px rgba(15,23,42,.25)}.row{display:flex;gap:10px;justify-content:flex-end}button{height:38px;padding:0 12px;border-radius:8px;border:1px solid #cbd5e1;background:#fff}.primary{background:#1463ff;color:#fff;border-color:#1463ff}.stack{display:grid;gap:12px}</style></head><body><main class="wrap"><h1>Modal</h1><p class="sub">Alert/confirm pattern with focus trap and escape-close behavior guidance.</p><section class="overlay"><div class="stack"><article class="modal" role="dialog" aria-modal="true"><h2 style="margin:0 0 8px">Confirm publish</h2><p style="margin:0 0 14px;color:#475569">This will publish updates to all consuming apps.</p><div class="row"><button>Cancel</button><button class="primary">Publish</button></div></article></div></section></main></body></html>
