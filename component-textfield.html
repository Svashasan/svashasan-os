<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Component - TextField</title><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script><style>body{margin:0;font-family:"IBM Plex Sans","Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}.wrap{max-width:980px;margin:40px auto;padding:0 20px}h1{margin:0 0 8px}.sub{color:#475569;margin:0 0 20px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:14px}.field{display:grid;gap:6px;max-width:520px}label{font-weight:600;font-size:14px}input,textarea{height:40px;border:1px solid #cbd5e1;border-radius:8px;padding:0 12px;font-size:14px}textarea{height:96px;padding:10px 12px}.hint{font-size:12px;color:#475569}.err{font-size:12px;color:#dc2626}.row{display:flex;gap:16px;flex-wrap:wrap}</style></head><body><main class="wrap"><h1>TextField</h1><p class="sub">Label, hint, required, validation error, and textarea variant.</p><section class="card"><div class="row"><div class="field"><label>Email *</label><input placeholder="name@company.com"/><span class="hint">Use your company email</span></div><div class="field"><label>Email *</label><input aria-invalid="true" value="invalid@"/><span class="err">Enter a valid email address</span></div></div></section><section class="card"><div class="field"><label>Description</label><textarea placeholder="Add context"></textarea><span class="hint">0/280 characters</span></div></section></main></body></html>
